name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and release (macOS ARM64)
    runs-on: macos-latest
    steps:
      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GIT_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release -p fireshark-cli -p fireshark-mcp

      - name: Package artifact
        env:
          VERSION: ${{ steps.tag.outputs.tag }}
        run: |
          ARCHIVE="fireshark-${VERSION}-aarch64-apple-darwin.zip"
          zip -j "${ARCHIVE}" \
            target/release/fireshark \
            target/release/fireshark-mcp \
            LICENSE
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
